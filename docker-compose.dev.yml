# Build Coddy from the local Dockerfile (for development and smoke tests).
# See docs/docker.md
#
#   docker compose -f docker-compose.dev.yml build
#   docker compose -f docker-compose.dev.yml up -d --build

services:
  coddy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${CODDY_VERSION:-dev}
        # Includes `gateway` so the built image can run `coddy gateway` (see command override below).
        BUILD_TAGS: ${CODDY_BUILD_TAGS:-http,scheduler,ui,memory,gateway}
    image: coddy-agent:${CODDY_VERSION:-dev}
    # Default runs `coddy http`. Override to run another mode, e.g. the messenger gateway:
    #   CODDY_COMMAND="gateway --cwd /workspace" docker compose -f docker-compose.dev.yml up -d --build
    command: ${CODDY_COMMAND:-http -H 0.0.0.0 -P 12345}
    ports:
      - "${CODDY_HTTP_PORT:-12345}:12345"
    working_dir: /workspace
    environment:
      CODDY_HOME: /home/user/.coddy
      CODDY_CWD: /workspace
      CODDY_CONFIG: /home/user/.coddy.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY-}
      # Messenger gateway bot token (used only in gateway mode; empty if unset).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN-}
    volumes:
      - ${CODDY_CONFIG-./config.yaml}:/home/user/.coddy.yaml:ro
      - ${CODDY_CWD-./workspace}:/workspace
      - ${CODDY_HOME-./coddy_home}:/home/user/.coddy
    healthcheck:
      test: ["CMD", "/bin/coddy", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "100k"
